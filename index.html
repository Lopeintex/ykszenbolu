<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKS Odak Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; user-select: none; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--surface); padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .auth-card h1 { color: var(--primary); margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--surface-hover); border-radius: 8px; color: white; outline: none; transition: border 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; color: white; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: #000; }
        .auth-buttons { display: flex; gap: 10px; margin-top: 20px; }

        /* Main App Layout */
        #app-screen { display: none; width: 100%; height: 100%; }
        
        /* Sidebar */
        nav { width: 80px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 30px; z-index: 100; }
        .nav-item { color: var(--text-muted); font-size: 24px; cursor: pointer; transition: color 0.3s; position: relative; }
        .nav-item:hover, .nav-item.active { color: var(--primary); }
        .nav-item.active::after { content: ''; position: absolute; left: -25px; top: 50%; transform: translateY(-50%); width: 4px; height: 20px; background: var(--primary); border-radius: 0 4px 4px 0; }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        
        /* Header */
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .tools { display: flex; gap: 15px; color: var(--text-muted); font-size: 20px; }
        .tools i { cursor: pointer; transition: color 0.2s; }
        .tools i:hover { color: white; }

        /* Views */
        .view { display: none; flex: 1; padding: 30px; overflow-y: auto; }
        .view.active { display: flex; flex-direction: column; }

        /* Timer View (Zen) */
        #view-timer { align-items: center; justify-content: center; position: relative; }
        .timer-ring { width: 300px; height: 300px; border-radius: 50%; border: 8px solid var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(0,0,0,0.2); position: relative; }
        .timer-ring.active { border-color: var(--primary); box-shadow: 0 0 40px rgba(59, 130, 246, 0.3); }
        .timer-ring.break { border-color: var(--success); }
        .time-display { font-size: 56px; font-weight: 800; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
        .timer-controls { display: flex; gap: 15px; margin-top: 40px; width: 100%; max-width: 400px; }
        
        /* Active Users Panel (Side) */
        .active-users-panel { position: absolute; right: 30px; top: 30px; width: 250px; background: var(--surface); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); max-height: calc(100% - 60px); overflow-y: auto; }
        .active-users-panel h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.working { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-dot.break { background: var(--warning); }

        /* Curriculum View */
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }
        .subject-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .subject-card h3 { color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .topic-list { display: flex; flex-direction: column; gap: 8px; }
        .topic-item { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-muted); cursor: pointer; }
        .topic-item input[type="checkbox"] { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
        
        /* Audio Player Element */
        audio { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid rgba(255,255,255,0.05); order: 3; }
            .nav-item.active::after { top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 4px; border-radius: 0 0 4px 4px; }
            .active-users-panel { display: none; } /* Hide on mobile to save space */
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop></audio>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>YKS ODAK</h1>
            <div class="input-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifre">
            </div>
            <div class="auth-buttons">
                <button class="btn btn-primary" onclick="handleAuth('login')">GİRİŞ</button>
                <button class="btn btn-surface" style="background: var(--surface-hover);" onclick="handleAuth('register')">KAYIT</button>
            </div>
            <p id="auth-error" style="color: var(--danger); font-size: 12px; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <div id="app-screen">
        <nav>
            <div class="nav-item active" onclick="switchView('timer', this)"><i class="fa-solid fa-clock"></i></div>
            <div class="nav-item" onclick="switchView('curriculum', this)"><i class="fa-solid fa-book"></i></div>
            <div class="nav-item" onclick="switchView('leaderboard', this)"><i class="fa-solid fa-trophy"></i></div>
            <div style="flex: 1;"></div>
            <div class="nav-item" style="color: var(--danger);" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></div>
        </nav>

        <main>
            <header>
                <div class="user-info">
                    <span id="display-username">Kullanıcı</span>
                </div>
                <div class="tools">
                    <i class="fa-solid fa-headphones" id="audio-toggle" onclick="toggleAudio()" title="Lofi Aç/Kapat"></i>
                </div>
            </header>

            <div id="view-timer" class="view active">
                <div class="timer-ring" id="timer-ring">
                    <div class="time-display" id="time-display">00:00:00</div>
                    <div id="timer-status" style="color: var(--text-muted); margin-top: 10px; font-size: 14px;">BEKLİYOR</div>
                </div>

                <div class="timer-controls">
                    <button id="btn-start" class="btn btn-primary" onclick="startTimer()"><i class="fa-solid fa-play"></i> ODAKLAN</button>
                    <button id="btn-break" class="btn btn-warning" style="display: none;" onclick="startBreak()"><i class="fa-solid fa-mug-hot"></i> MOLA</button>
                    <button id="btn-stop" class="btn btn-danger" style="display: none;" onclick="stopTimer()"><i class="fa-solid fa-stop"></i> BİTİR</button>
                </div>

                <div class="active-users-panel">
                    <h3>Şu An Odaklananlar</h3>
                    <div id="active-users-list">
                        </div>
                </div>
            </div>

            <div id="view-curriculum" class="view">
                <h2 style="margin-bottom: 20px;">Sayısal Görev Tablosu</h2>
                <div class="subject-grid" id="curriculum-grid">
                    </div>
            </div>

            <div id="view-leaderboard" class="view">
                <h2 style="margin-bottom: 20px;">Genel Sıralama</h2>
                <div style="background: var(--surface); border-radius: 12px; padding: 20px; max-width: 600px;">
                    <div id="leaderboard-list" style="display: flex; flex-direction: column; gap: 15px;">
                        </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // FIREBASE CONF (Değiştirme)
        const firebaseConfig = { 
            apiKey: "AIzaSyB_eX2AGPyepy0H_pbnLtwShCgF5Sr_ETQ", 
            authDomain: "yks-koy.firebaseapp.com", 
            projectId: "yks-koy", 
            storageBucket: "yks-koy.firebasestorage.app", 
            messagingSenderId: "400949745524", 
            appId: "1:400949745524:web:f28d2bd3d408aa84bcfe21" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.firestore();

        // APP STATE
        let currentUser = null;
        let userData = {};
        let timerInterval = null;
        let audioPlaying = false;
        
        // MÜFREDAT (Sayısal Odaklı Sadeleştirildi)
        const aytSayisal = {
            "AYT Matematik": ["Polinomlar", "2.Dereceden Denklemler", "Trigonometri", "Logaritma", "Diziler", "Limit", "Türev", "İntegral"],
            "AYT Fizik": ["Vektörler", "Newton Hareket", "Atışlar", "Çembersel Hareket", "Dalga Mekaniği", "Modern Fizik"],
            "AYT Kimya": ["Modern Atom", "Gazlar", "Sıvı Çözeltiler", "Hız", "Denge", "Organik Kimya"],
            "AYT Biyoloji": ["Sistemler", "Genden Proteine", "Canlılık ve Enerji", "Bitki Biyolojisi"]
        };

        // --- AUTHENTICATION ---
        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                initApp();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        async function handleAuth(type) {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const err = document.getElementById('auth-error');
            if(!u || !p) { err.innerText = "Alanları doldur."; err.style.display = 'block'; return; }
            
            const email = u.toLowerCase() + "@yks-koy.com";
            try {
                if (type === 'login') {
                    await auth.signInWithEmailAndPassword(email, p);
                } else {
                    const res = await auth.createUserWithEmailAndPassword(email, p);
                    await db.collection('users').doc(res.user.uid).set({
                        username: u,
                        completedTopics: [],
                        totalTime: 0, // Genel sıralama için oluşturuldu
                        timer: { state: 'idle', start: 0 }
                    });
                }
            } catch (error) {
                err.innerText = "Giriş başarısız. Kullanıcı adı veya şifre hatalı.";
                err.style.display = 'block';
            }
        }

        function logout() { auth.signOut(); }

        // --- CORE APP LOGIC ---
        function initApp() {
            // Canlı kullanıcı verisi dinleme
            db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                if (doc.exists) {
                    userData = doc.data();
                    document.getElementById('display-username').innerText = userData.username;
                    renderTimerState(userData.timer);
                    renderCurriculum();
                }
            });

            // Aktif kullanıcıları dinleme
            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('active-users-list');
                const leaderboard = document.getElementById('leaderboard-list');
                list.innerHTML = ''; leaderboard.innerHTML = '';
                
                let allUsers = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    allUsers.push(data);
                    
                    // Aktif panel
                    if (data.timer && data.timer.state !== 'idle' && data.username !== 'ADMIN') {
                        const isWorking = data.timer.state === 'working';
                        list.innerHTML += `
                            <div class="user-row">
                                <div><span class="status-dot ${isWorking ? 'working' : 'break'}"></span>${data.username}</div>
                                <span style="color: var(--text-muted)">${isWorking ? 'Odakta' : 'Molada'}</span>
                            </div>
                        `;
                    }
                });

                // Leaderboard render (Eski 'weeklyTime' verilerini de dahil ederek Genel Sıralama yapar)
                allUsers.sort((a,b) => ((b.totalTime || b.weeklyTime || 0) - (a.totalTime || a.weeklyTime || 0)))
                    .filter(u => u.username !== 'ADMIN')
                    .slice(0, 10)
                    .forEach((u, i) => {
                        let mins = Math.floor((u.totalTime || u.weeklyTime || 0) / 60000);
                        leaderboard.innerHTML += `
                            <div style="display:flex; justify-content:space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <span><strong style="color: ${i===0?'var(--warning)':'white'}">#${i+1}</strong> ${u.username}</span>
                                <span style="color: var(--primary); font-family: monospace;">${mins} dk</span>
                            </div>
                        `;
                    });
            });
        }

        // --- TIMER LOGIC (Simplified & Robust) ---
        function renderTimerState(timerObj) {
            const state = timerObj?.state || 'idle';
            const ring = document.getElementById('timer-ring');
            const statusText = document.getElementById('timer-status');
            const btnStart = document.getElementById('btn-start');
            const btnBreak = document.getElementById('btn-break');
            const btnStop = document.getElementById('btn-stop');

            clearInterval(timerInterval);
            ring.className = 'timer-ring';

            if (state === 'idle') {
                document.getElementById('time-display').innerText = "00:00:00";
                statusText.innerText = "BEKLİYOR";
                btnStart.style.display = 'block';
                btnBreak.style.display = 'none';
                btnStop.style.display = 'none';
            } 
            else if (state === 'working') {
                ring.classList.add('active');
                statusText.innerText = "ODAKLANILDI";
                btnStart.style.display = 'none';
                btnBreak.style.display = 'block';
                btnStop.style.display = 'block';
                timerInterval = setInterval(() => updateDisplay(timerObj.start), 1000);
                updateDisplay(timerObj.start);
            }
            else if (state === 'break') {
                ring.classList.add('break');
                statusText.innerText = "MOLADA";
                document.getElementById('time-display').innerText = "MOLA";
                btnStart.style.display = 'block';
                btnStart.innerText = "ODAKLANMAYA DÖN";
                btnBreak.style.display = 'none';
                btnStop.style.display = 'block';
            }
        }

        function updateDisplay(startTime) {
            const diff = Date.now() - startTime;
            const h = Math.floor(diff/3600000).toString().padStart(2, '0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2, '0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${h}:${m}:${s}`;
        }

        async function startTimer() {
            await db.collection('users').doc(currentUser.uid).update({
                'timer.state': 'working',
                'timer.start': Date.now()
            });
        }

        async function startBreak() {
            await db.collection('users').doc(currentUser.uid).update({
                'timer.state': 'break'
            });
        }

        async function stopTimer() {
            if (userData.timer.state === 'working') {
                const durationMs = Date.now() - userData.timer.start;
                
                await db.collection('users').doc(currentUser.uid).update({
                    'timer.state': 'idle',
                    totalTime: firebase.firestore.FieldValue.increment(durationMs)
                });
            } else {
                await db.collection('users').doc(currentUser.uid).update({ 'timer.state': 'idle' });
            }
            document.getElementById('btn-start').innerHTML = '<i class="fa-solid fa-play"></i> ODAKLAN';
        }

        // --- CURRICULUM LOGIC ---
        function renderCurriculum() {
            const grid = document.getElementById('curriculum-grid');
            grid.innerHTML = '';
            
            const completed = userData.completedTopics || [];

            Object.entries(aytSayisal).forEach(([subject, topics]) => {
                let html = `<div class="subject-card"><h3>${subject}</h3><div class="topic-list">`;
                topics.forEach(topic => {
                    const isDone = completed.includes(topic);
                    html += `
                        <label class="topic-item">
                            <input type="checkbox" onchange="toggleTopic('${topic}')" ${isDone ? 'checked' : ''}>
                            <span style="${isDone ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${topic}</span>
                        </label>
                    `;
                });
                html += `</div></div>`;
                grid.innerHTML += html;
            });
        }

        async function toggleTopic(topicName) {
            const completed = userData.completedTopics || [];
            if (completed.includes(topicName)) {
                await db.collection('users').doc(currentUser.uid).update({
                    completedTopics: firebase.firestore.FieldValue.arrayRemove(topicName)
                });
            } else {
                await db.collection('users').doc(currentUser.uid).update({
                    completedTopics: firebase.firestore.FieldValue.arrayUnion(topicName)
                });
            }
        }

        // --- UI & UTILS ---
        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleAudio() {
            const audio = document.getElementById('bg-audio');
            const icon = document.getElementById('audio-toggle');
            
            if (audioPlaying) {
                audio.pause();
                icon.style.color = 'var(--text-muted)';
            } else {
                audio.src = 'https://stream.zeno.fm/f3wvbbqmdg8uv'; 
                audio.volume = 0.3;
                audio.play();
                icon.style.color = 'var(--primary)';
            }
            audioPlaying = !audioPlaying;
        }
    </script>
</body>
</html>
